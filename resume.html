<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Resume — Abdulkarim Ali Khamis</title>
<link rel="stylesheet" href="style.css" />
<!-- jsPDF for client-side PDF generation -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="data.js"></script>
<style>
  .resume-actions {
    display: flex; gap: 1rem; align-items: center; margin-bottom: 2.5rem; flex-wrap: wrap;
  }
  .download-btn {
    display: inline-flex; align-items: center; gap: 0.6rem;
    background: var(--accent3); color: #050810;
    padding: 0.85rem 2rem; font-family: var(--sans);
    font-weight: 700; font-size: 0.9rem; cursor: pointer;
    border: none; transition: opacity 0.2s, transform 0.2s; letter-spacing: 0.04em;
  }
  .download-btn:hover { opacity: 0.85; transform: translateY(-2px); }
  .download-btn:disabled { opacity: 0.5; cursor: wait; }
  .print-btn {
    display: inline-flex; align-items: center; gap: 0.6rem;
    border: 1px solid var(--border); color: var(--muted);
    padding: 0.85rem 1.8rem; font-family: var(--sans);
    font-size: 0.9rem; cursor: pointer; background: none;
    transition: border-color 0.2s, color 0.2s;
  }
  .print-btn:hover { border-color: var(--accent); color: var(--accent); }
  .auto-note {
    font-family: var(--mono); font-size: 0.72rem; color: var(--muted);
    background: rgba(99,210,255,0.05); border: 1px solid rgba(99,210,255,0.15);
    padding: 0.5rem 1rem; display: inline-block;
  }

  /* RESUME PREVIEW */
  .resume-preview {
    background: #fff; color: #111;
    max-width: 820px; margin: 0 auto;
    box-shadow: 0 0 60px rgba(0,0,0,0.5);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px; line-height: 1.5;
    display: grid; grid-template-columns: 220px 1fr;
    min-height: 1120px;
  }

  /* SIDEBAR */
  .r-sidebar {
    background: #0d1321; color: #f0f6ff;
    padding: 0; display: flex; flex-direction: column;
  }
  .r-sidebar-top {
    background: #63d2ff; padding: 1.5rem 1.2rem 1rem;
  }
  .r-name { font-size: 13px; font-weight: 800; color: #050810; line-height: 1.2; letter-spacing: -0.3px; }
  .r-role { font-size: 8px; color: #050810; opacity: 0.7; margin-top: 3px; letter-spacing: 0.5px; text-transform: uppercase; font-weight: 600; }

  .r-sidebar-body { padding: 1.2rem 1rem; flex: 1; }
  .r-section-label {
    font-size: 7px; letter-spacing: 1.5px; text-transform: uppercase;
    color: #63d2ff; font-weight: 700; margin: 1rem 0 0.5rem;
    padding-bottom: 3px; border-bottom: 1px solid rgba(99,210,255,0.2);
  }
  .r-section-label:first-child { margin-top: 0; }

  .r-contact-item { display: flex; gap: 6px; margin-bottom: 4px; align-items: flex-start; }
  .r-contact-icon { color: #63d2ff; font-size: 8px; margin-top: 1px; flex-shrink: 0; }
  .r-contact-text { font-size: 7.5px; color: #8899aa; word-break: break-all; }

  .r-skill-group-name { font-size: 7px; color: #a78bfa; font-weight: 700; margin: 6px 0 3px; letter-spacing: 0.5px; text-transform: uppercase; }
  .r-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 4px; }
  .r-tag {
    font-size: 6.5px; padding: 2px 6px;
    background: rgba(99,210,255,0.08); color: #63d2ff;
    border: 0.5px solid rgba(99,210,255,0.25); border-radius: 2px;
  }

  .r-edu-degree { font-size: 8px; font-weight: 700; color: #f0f6ff; }
  .r-edu-school { font-size: 7px; color: #a78bfa; }
  .r-edu-year   { font-size: 6.5px; color: #8899aa; margin-bottom: 6px; }

  .r-cert { font-size: 7px; color: #8899aa; margin-bottom: 3px; display: flex; gap: 4px; }
  .r-cert-check { color: #34d399; flex-shrink: 0; }

  .r-lang { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .r-lang-name  { font-size: 7.5px; color: #f0f6ff; font-weight: 600; }
  .r-lang-level { font-size: 7px; color: #8899aa; }

  /* MAIN */
  .r-main { padding: 0; display: flex; flex-direction: column; }
  .r-header {
    background: #0a1020; padding: 1.5rem 1.5rem 1rem;
    border-bottom: 3px solid #63d2ff;
  }
  .r-header-name { font-size: 22px; font-weight: 800; color: #f0f6ff; letter-spacing: -0.5px; }
  .r-header-title { font-size: 10px; color: #63d2ff; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin: 4px 0 10px; }
  .r-header-contacts { display: flex; gap: 16px; flex-wrap: wrap; }
  .r-header-contact { font-size: 7.5px; color: #8899aa; display: flex; gap: 4px; align-items: center; }
  .r-header-dot { color: #34d399; font-size: 7px; }

  .r-main-body { padding: 1rem 1.5rem; flex: 1; }
  .r-main-section { margin-bottom: 1.2rem; }
  .r-main-label {
    font-size: 7.5px; letter-spacing: 2px; text-transform: uppercase;
    color: #a78bfa; font-weight: 700; margin-bottom: 6px;
    padding-bottom: 3px; border-bottom: 1px solid #1e2d4a;
  }
  .r-summary { font-size: 8px; color: #6b7a8d; line-height: 1.7; }

  .r-exp-item { margin-bottom: 10px; }
  .r-exp-header { display: flex; justify-content: space-between; align-items: baseline; }
  .r-exp-role { font-size: 9px; font-weight: 700; color: #1a1a2e; }
  .r-exp-dates { font-size: 7px; color: #9ca3af; }
  .r-exp-company { font-size: 8px; color: #6366f1; font-weight: 600; margin: 1px 0 4px; }
  .r-exp-bullets { list-style: none; padding: 0; }
  .r-exp-bullets li {
    font-size: 7.5px; color: #6b7a8d; line-height: 1.6;
    padding-left: 10px; position: relative; margin-bottom: 1px;
  }
  .r-exp-bullets li::before { content: "▸"; position: absolute; left: 0; color: #34d399; font-size: 7px; top: 1px; }

  .r-proj-item { margin-bottom: 7px; display: flex; gap: 8px; }
  .r-proj-name { font-size: 8px; font-weight: 700; color: #1a1a2e; }
  .r-proj-metric { font-size: 7px; color: #34d399; font-weight: 600; margin: 1px 0; }
  .r-proj-stack { font-size: 7px; color: #9ca3af; }

  .r-footer {
    background: #0a1020; padding: 6px 1.5rem;
    display: flex; justify-content: center;
    font-size: 7px; color: #8899aa; letter-spacing: 0.5px;
  }

  /* Print styles */
  @media print {
    body { background: white !important; }
    nav, .page > *:not(.resume-preview-wrap), .resume-actions, footer { display: none !important; }
    .resume-preview-wrap { padding: 0 !important; }
    .resume-preview { box-shadow: none; max-width: 100%; }
    .page { padding: 0 !important; max-width: 100% !important; }
  }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="glow"></div>

<nav>
  <a href="index.html" class="nav-logo">&lt;AAK /&gt;</a>
  <ul class="nav-links">
    <li><a href="about.html">About</a></li>
    <li><a href="skills.html">Skills</a></li>
    <li><a href="projects.html">Projects</a></li>
    <li><a href="experience.html">Experience</a></li>

  </ul>
</nav>

<div class="page">
  <div class="section-label fade-up">// resume</div>
  <h1 class="section-title fade-up-2">Auto-Generated <em>Resume</em></h1>

  <div class="resume-actions fade-up-3">
    <button class="download-btn" id="downloadBtn" onclick="downloadPDF()">
      ↓ Download PDF
    </button>
    <button class="print-btn" onclick="window.print()">⎙ Print</button>
    <span class="auto-note">// Updates automatically when you edit data.js</span>
  </div>

  <div class="resume-preview-wrap fade-up-4">
    <div class="resume-preview" id="resumePreview">

      <!-- SIDEBAR -->
      <div class="r-sidebar">
        <div class="r-sidebar-top">
          <div class="r-name" id="s-name"></div>
          <div class="r-role" id="s-role"></div>
        </div>
        <div class="r-sidebar-body">

          <div class="r-section-label">Contact</div>
          <div id="s-contacts"></div>

          <div class="r-section-label">Core Skills</div>
          <div id="s-skills"></div>

          <div class="r-section-label">Education</div>
          <div id="s-education"></div>

          <div class="r-section-label">Certifications</div>
          <div id="s-certs"></div>

          <div class="r-section-label">Languages</div>
          <div id="s-langs"></div>

        </div>
      </div>

      <!-- MAIN -->
      <div class="r-main">
        <div class="r-header">
          <div class="r-header-name" id="m-name"></div>
          <div class="r-header-title" id="m-title"></div>
          <div class="r-header-contacts" id="m-contacts"></div>
        </div>

        <div class="r-main-body">
          <div class="r-main-section">
            <div class="r-main-label">Professional Summary</div>
            <div class="r-summary" id="m-summary"></div>
          </div>

          <div class="r-main-section">
            <div class="r-main-label">Work Experience</div>
            <div id="m-experience"></div>
          </div>

          <div class="r-main-section">
            <div class="r-main-label">Key Projects</div>
            <div id="m-projects"></div>
          </div>
        </div>

        <div class="r-footer" id="m-footer"></div>
      </div>

    </div>
  </div>
</div>

<footer>
  <p>&copy; 2025 <span id="f-name"></span> · Data Scientist &amp; AI Engineer</p>
</footer>

<script>
// ── RENDER FROM DATA.JS ──────────────────────────────────────
const D = PORTFOLIO;

// Sidebar name/role
document.getElementById('s-name').textContent = D.name;
document.getElementById('s-role').textContent = D.title;

// Sidebar contacts
const contactItems = [
  { icon: '✉', text: D.email },
  { icon: '⌥', text: D.github },
  { icon: 'in', text: D.linkedin },
  { icon: '📍', text: D.location },
];
if (D.phone) contactItems.splice(1, 0, { icon: '☎', text: D.phone });
document.getElementById('s-contacts').innerHTML = contactItems.map(i =>
  `<div class="r-contact-item"><span class="r-contact-icon">${i.icon}</span><span class="r-contact-text">${i.text}</span></div>`
).join('');

// Sidebar skills — take top 4 groups, first 3 tags each
const topSkills = D.skillGroups.slice(0, 4);
document.getElementById('s-skills').innerHTML = topSkills.map(g =>
  `<div class="r-skill-group-name">${g.title}</div>
   <div class="r-tags">${g.tags.slice(0, 4).map(t => `<span class="r-tag">${t}</span>`).join('')}</div>`
).join('');

// Sidebar education
document.getElementById('s-education').innerHTML = D.education.map(e =>
  `<div class="r-edu-degree">${e.degree}</div>
   <div class="r-edu-school">${e.school}</div>
   <div class="r-edu-year">${e.years}</div>`
).join('');

// Sidebar certs — top 4
document.getElementById('s-certs').innerHTML = D.certifications.slice(0, 4).map(c =>
  `<div class="r-cert"><span class="r-cert-check">✓</span><span>${c.name}</span></div>`
).join('');

// Sidebar languages
document.getElementById('s-langs').innerHTML = D.languages.map(l =>
  `<div class="r-lang"><span class="r-lang-name">${l.lang}</span><span class="r-lang-level">${l.level}</span></div>`
).join('');

// Main header
document.getElementById('m-name').textContent = D.name;
document.getElementById('m-title').textContent = D.title;
document.getElementById('m-contacts').innerHTML = [
  D.email, D.github, D.linkedin, D.location
].map(v => `<div class="r-header-contact"><span class="r-header-dot">●</span>${v}</div>`).join('');

// Main summary — first 2 about paragraphs combined
document.getElementById('m-summary').textContent = D.about.slice(0, 2).join(' ');

// Main experience
document.getElementById('m-experience').innerHTML = D.experience.map(e =>
  `<div class="r-exp-item">
    <div class="r-exp-header">
      <div class="r-exp-role">${e.role}</div>
      <div class="r-exp-dates">${e.dates}</div>
    </div>
    <div class="r-exp-company">${e.company} · ${e.type}</div>
    <ul class="r-exp-bullets">
      ${e.bullets.map(b => `<li>${b}</li>`).join('')}
    </ul>
  </div>`
).join('');

// Main projects — top 4
document.getElementById('m-projects').innerHTML = D.projects.slice(0, 4).map(p =>
  `<div class="r-proj-item">
    <div>
      <div class="r-proj-name">${p.title}</div>
      <div class="r-proj-metric">${p.metric}</div>
      <div class="r-proj-stack">${p.tags.join(' · ')}</div>
    </div>
  </div>`
).join('');

// Footer
document.getElementById('m-footer').textContent =
  `${D.email}  ·  ${D.github}  ·  ${D.linkedin}`;

// Page footer
document.getElementById('f-name').textContent = D.name;

// Nav logo
document.querySelector('.nav-logo').textContent = `<${D.initials} />`;

// ── PDF DOWNLOAD ─────────────────────────────────────────────
async function downloadPDF() {
  const btn = document.getElementById('downloadBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Generating...';

  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });

    const W = 210, H = 297;
    const SIDEBAR = 58;
    const ACCENT = [99, 210, 255];
    const ACCENT2 = [167, 139, 250];
    const ACCENT3 = [52, 211, 153];
    const DARK = [13, 19, 33];
    const DARKER = [10, 16, 32];
    const CARD = [17, 24, 39];
    const WHITE = [240, 246, 255];
    const MUTED = [136, 153, 170];

    // Backgrounds
    doc.setFillColor(...DARK);
    doc.rect(0, 0, W, H, 'F');
    doc.setFillColor(...CARD);
    doc.rect(0, 0, SIDEBAR, H, 'F');

    // Sidebar top accent
    doc.setFillColor(...ACCENT);
    doc.rect(0, 0, SIDEBAR, 1.5, 'F');

    // Header bg
    doc.setFillColor(...DARKER);
    doc.rect(SIDEBAR, 0, W - SIDEBAR, 42, 'F');
    doc.setFillColor(...ACCENT);
    doc.rect(SIDEBAR, 42, W - SIDEBAR, 0.8, 'F');

    // Header text
    doc.setTextColor(...WHITE);
    doc.setFontSize(18);
    doc.setFont('helvetica', 'bold');
    doc.text(D.name.toUpperCase(), SIDEBAR + 8, 14);

    doc.setTextColor(...ACCENT);
    doc.setFontSize(7.5);
    doc.setFont('helvetica', 'bold');
    doc.text(D.title.toUpperCase(), SIDEBAR + 8, 21);

    // Header contacts
    doc.setTextColor(...MUTED);
    doc.setFontSize(6.5);
    doc.setFont('helvetica', 'normal');
    const hContacts = [D.email, D.github, D.linkedin, D.location];
    let hx = SIDEBAR + 8;
    hContacts.forEach((c, i) => {
      doc.text(c, hx, 30);
      hx += doc.getTextWidth(c) + 6;
    });

    // Available badge
    doc.setTextColor(...ACCENT3);
    doc.setFontSize(6);
    doc.text('● ' + D.availableText, SIDEBAR + 8, 38);

    // ── SIDEBAR CONTENT ──
    let sy = 50;

    const sectionLabel = (text, y) => {
      doc.setTextColor(...ACCENT);
      doc.setFontSize(6.5);
      doc.setFont('helvetica', 'bold');
      doc.text(text.toUpperCase(), 5, y);
      doc.setDrawColor(...ACCENT);
      doc.setLineWidth(0.3);
      doc.line(5, y + 1, SIDEBAR - 5, y + 1);
      return y + 5;
    };

    // Contact
    sy = sectionLabel('Contact', sy);
    const contacts = [
      { icon: 'Email:', val: D.email },
      { icon: 'GitHub:', val: D.github },
      { icon: 'LinkedIn:', val: D.linkedin },
      { icon: 'Location:', val: D.location },
    ];
    contacts.forEach(ct => {
      doc.setTextColor(...ACCENT);
      doc.setFontSize(6.5);
      doc.setFont('helvetica', 'bold');
      doc.text(ct.icon, 5, sy);
      doc.setTextColor(...MUTED);
      doc.setFont('helvetica', 'normal');
      // truncate long values
      let val = ct.val;
      while (doc.getTextWidth(val) > SIDEBAR - 22 && val.length > 5) val = val.slice(0, -4) + '...';
      doc.text(val, 5 + doc.getTextWidth(ct.icon) + 1.5, sy);
      sy += 4.5;
    });
    sy += 3;

    // Skills
    sy = sectionLabel('Core Skills', sy);
    D.skillGroups.slice(0, 4).forEach(g => {
      doc.setTextColor(...ACCENT2);
      doc.setFontSize(6.5);
      doc.setFont('helvetica', 'bold');
      doc.text(g.title, 5, sy);
      sy += 4;
      // tags
      let tx = 5;
      g.tags.slice(0, 4).forEach(tag => {
        const tw = doc.getTextWidth(tag) + 4;
        if (tx + tw > SIDEBAR - 3) { tx = 5; sy += 5; }
        doc.setFillColor(26, 37, 64);
        doc.setDrawColor(...ACCENT);
        doc.setLineWidth(0.3);
        doc.roundedRect(tx, sy - 3.5, tw, 5, 1, 1, 'FD');
        doc.setTextColor(...ACCENT);
        doc.setFontSize(6);
        doc.setFont('helvetica', 'normal');
        doc.text(tag, tx + 2, sy);
        tx += tw + 2;
      });
      sy += 7;
    });

    // Education
    sy = sectionLabel('Education', sy);
    D.education.forEach(e => {
      doc.setTextColor(...WHITE);
      doc.setFontSize(7);
      doc.setFont('helvetica', 'bold');
      // wrap degree
      const degWords = e.degree.split(' ');
      let degLine = '';
      degWords.forEach(w => {
        const test = degLine + (degLine ? ' ' : '') + w;
        if (doc.getTextWidth(test) < SIDEBAR - 10) degLine = test;
        else { doc.text(degLine, 5, sy); sy += 3.5; degLine = w; }
      });
      if (degLine) { doc.text(degLine, 5, sy); sy += 3.5; }
      doc.setTextColor(...ACCENT2);
      doc.setFontSize(6.5);
      doc.setFont('helvetica', 'normal');
      doc.text(e.school, 5, sy); sy += 3.5;
      doc.setTextColor(...MUTED);
      doc.setFontSize(6);
      doc.text(e.years, 5, sy); sy += 6;
    });

    // Certs
    sy = sectionLabel('Certifications', sy);
    D.certifications.slice(0, 4).forEach(c => {
      doc.setTextColor(...ACCENT3);
      doc.setFontSize(6.5);
      doc.text('✓', 5, sy);
      doc.setTextColor(...MUTED);
      doc.setFont('helvetica', 'normal');
      let cn = c.name;
      while (doc.getTextWidth(cn) > SIDEBAR - 13) cn = cn.slice(0, -4) + '...';
      doc.text(cn, 9, sy);
      sy += 4.5;
    });
    sy += 2;

    // Languages
    sy = sectionLabel('Languages', sy);
    D.languages.forEach(l => {
      doc.setTextColor(...WHITE);
      doc.setFontSize(7);
      doc.setFont('helvetica', 'bold');
      doc.text(l.lang, 5, sy);
      doc.setTextColor(...MUTED);
      doc.setFont('helvetica', 'normal');
      doc.text(l.level, SIDEBAR - 5 - doc.getTextWidth(l.level), sy);
      sy += 5;
    });

    // ── MAIN CONTENT ──
    let my = 50;
    const MX = SIDEBAR + 8;
    const MW = W - SIDEBAR - 16;

    const mainSection = (text, y) => {
      doc.setTextColor(...ACCENT2);
      doc.setFontSize(7);
      doc.setFont('helvetica', 'bold');
      doc.text(text.toUpperCase(), MX, y);
      doc.setDrawColor(30, 45, 74);
      doc.setLineWidth(0.5);
      doc.line(MX, y + 1, W - 8, y + 1);
      return y + 6;
    };

    // Summary
    my = mainSection('Professional Summary', my);
    const summaryText = D.about.slice(0, 2).join(' ');
    doc.setTextColor(...MUTED);
    doc.setFontSize(7.5);
    doc.setFont('helvetica', 'normal');
    const summaryLines = doc.splitTextToSize(summaryText, MW);
    doc.text(summaryLines.slice(0, 3), MX, my);
    my += summaryLines.slice(0, 3).length * 4 + 4;

    // Experience
    my = mainSection('Work Experience', my);
    D.experience.forEach(e => {
      doc.setTextColor(26, 26, 46);
      doc.setFontSize(8.5);
      doc.setFont('helvetica', 'bold');
      doc.text(e.role, MX, my);
      doc.setTextColor(...MUTED);
      doc.setFontSize(7);
      doc.setFont('helvetica', 'normal');
      doc.text(e.dates, W - 8, my, { align: 'right' });
      my += 4;
      doc.setTextColor(99, 102, 241);
      doc.setFontSize(7.5);
      doc.setFont('helvetica', 'bold');
      doc.text(`${e.company} · ${e.type}`, MX, my);
      my += 4;
      e.bullets.forEach(b => {
        doc.setTextColor(...ACCENT3);
        doc.setFontSize(7.5);
        doc.text('▸', MX, my);
        doc.setTextColor(...MUTED);
        doc.setFont('helvetica', 'normal');
        const bLines = doc.splitTextToSize(b, MW - 5);
        doc.text(bLines, MX + 4, my);
        my += bLines.length * 3.8 + 1;
      });
      my += 3;
    });

    // Projects
    my = mainSection('Key Projects', my);
    D.projects.slice(0, 4).forEach(p => {
      doc.setTextColor(26, 26, 46);
      doc.setFontSize(8);
      doc.setFont('helvetica', 'bold');
      doc.text(p.title, MX, my);
      doc.setTextColor(...ACCENT3);
      doc.setFontSize(7);
      doc.setFont('helvetica', 'bold');
      doc.text(p.metric, W - 8, my, { align: 'right' });
      my += 4;
      doc.setTextColor(...MUTED);
      doc.setFontSize(7);
      doc.setFont('helvetica', 'normal');
      doc.text(p.tags.join(' · '), MX, my);
      my += 6;
    });

    // Footer
    doc.setFillColor(...DARKER);
    doc.rect(SIDEBAR, H - 10, W - SIDEBAR, 10, 'F');
    doc.setFillColor(...CARD);
    doc.rect(0, H - 10, SIDEBAR, 10, 'F');
    doc.setTextColor(...MUTED);
    doc.setFontSize(6.5);
    doc.setFont('helvetica', 'normal');
    doc.text(`${D.email}  ·  ${D.github}  ·  ${D.linkedin}`, (SIDEBAR + W) / 2, H - 4, { align: 'center' });

    const filename = D.name.replace(/\s+/g, '_') + '_Resume.pdf';
    doc.save(filename);
  } catch (err) {
    console.error(err);
    alert('PDF generation failed. Please use the Print option instead.');
  }

  btn.disabled = false;
  btn.textContent = '↓ Download PDF';
}
</script>
</body>
</html>
